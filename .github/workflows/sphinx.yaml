name: "Sphinx: Render docs"

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Upgrade pip
      run: |
        python3 -m pip install --upgrade pip

    - name: Install minimal Python packages
      run: |
        pip install -r requirements.bootstrap.txt

    - uses: actions/checkout@v4
      with:
        persist-credentials: false
        github_token: ${{ secrets.GITHUB_TOKEN }}
    
    # - name: Setup Pandoc
    #   uses: pandoc/actions/setup@v1 # Use a specific version if needed

    # - name: Convert Markdown to TEX
    #   run: pandoc -s README.rst -o README.tex --metadata title="My Project Page"

    # - name: Commit and push changes
    #   uses: stefanzweifel/git-auto-commit-action@v5
    #   with:
    #     # Optional: specify which files to commit (default is all changes)
    #     file_pattern: 'README.tex'
    #     commit_message: "Automated: Update generated files"
    #   env:
    #     github_token: ${{ secrets.GITHUB_TOKEN }}

    # - name: Upload artifacts
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: tex_to_html
    #     path: 'README.tex'

    # - name: Download pre-existing asset
    #   uses: actions/download-artifact@v4
    #   with:
    #     name: tex_to_html
    #     path: docs/source/ # Downloads to the 'src' directory

    - name: Build HTML
      uses: ammaraskar/sphinx-action@master

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: html-docs
        path: docs/build/html/

    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: docs/build/html